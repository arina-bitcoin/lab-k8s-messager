apiVersion: v1
kind: PersistentVolume
metadata:
  name: s3-pv-messager-uploads
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - allow-delete
    - region=us-east-1
    - url=http://minio.messager.svc.cluster.local:9000
    - use_path_request_style
  csi:
    driver: ch.ctrox.csi.s3-driver
    volumeHandle: messager-uploads-volume
    nodePublishSecretRef:
      name: csi-s3-secret
      namespace: messager
    volumeAttributes:
      bucketName: uploads
      mounter: rclone
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: message-uploads-pvc
  namespace: messager
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: s3-pv-messager-uploads
---
apiVersion: v1
kind: Secret
metadata:
  name: csi-s3-secret
  namespace: messager
type: Opaque
stringData:
  accessKeyID: minioadmin
  secretAccessKey: minioadmin123

