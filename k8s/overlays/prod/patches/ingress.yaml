apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: messager-ingress
  namespace: messager
spec:
  rules:
    - host: messager.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: bff
                port:
                  number: 8080

